<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <title>👶 新生兒黃疸居家照護衛教智慧客服小幫手</title>
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline';
      img-src 'self' https://raw.githubusercontent.com data:;
      connect-src 'self' https://jaundice-server.onrender.com;
      font-src 'self';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <img src="./assets/jaundice_logo.jpg" class="logo" alt="新生兒黃疸衛教小幫手 logo" style="width: 50px; height: 50px; border-radius: 50%; object-fit: cover;" />
      <div class="brand">
        <div class="title">👶 新生兒黃疸居家照護衛教智慧客服中心</div>
        <div class="subtitle">提供新生兒黃疸居家照護照護資訊的小幫手！⚠️ 此為衛教參考，若寶寶有不適、食慾不佳或大便顏色異常，請務必尋求專業兒科醫師協助。</div>
      </div>
      <select id="langSelect" class="lang-select" aria-label="語言選擇">
        <option value="繁體中文">🇹🇼 繁體中文</option>
        <option value="English">🇺🇸 English</option>
        <option value="印尼文">🇮🇩 Indonesia</option>
        <option value="越南文">🇻🇳 Tiếng Việt</option>
      </select>
    </header>

    <main class="main">
      <div id="messages" class="messages"></div>

      <div id="thinking" class="thinking hidden" role="status" aria-live="polite" aria-busy="true">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="thinking-text">小幫手正在為您整理衛教資訊，請稍候 🍼...</span>
      </div>
    </main>

    <footer class="composer">
      <textarea id="txtInput" class="input"
          rows="1"
          placeholder="請輸入您想了解的黃疸問題"
          enterkeyhint="send" autocomplete="off" autocapitalize="off" autocorrect="off"></textarea>
      <button id="btnSend" class="btn btn-primary">送出</button>
    </footer>

    <script src="marked.umd.js"></script>
    <script src="dompurify.umd.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
